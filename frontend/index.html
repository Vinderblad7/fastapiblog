<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VT Blog</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/components.css">
    <link rel="stylesheet" href="./css/register.css">
    <link rel="stylesheet" href="./css/profile.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <a class="header-logo" href="/">
                <img class="header-logo-image"
                 src="./assets/icons/Logo.svg"
                 alt="VT Logo"
                 width="50"
                 height="50"
                 loading="lazy">
            </a>     
            <div class="header-actions">
                <button class="header-register-button" type="button">Register</button>
                <button class="header-profile-button" type="button">Profile</button>
            </div>
        </div>
    </header>


    <main class="content">
        <h1 class="visually-hidden">Blog Posts</h1>
        <section class="posts">
            
            <article class="post">
                <h2>Post Title</h2>
                <p>Post content goes here...</p>
            </article>

            <article class="post">
                <h2>Another Post Title</h2>
                <p>More post content goes here...</p>
            </article>
    </main>

    <script src="./js/main.js"></script>
    
</body>
</html>
